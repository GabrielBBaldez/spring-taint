<svg width="112" height="112" viewBox="0 0 112 112" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Spring Taint Analyzer">
  <defs>
    <linearGradient id="stroke" x1="20" y1="10" x2="92" y2="104" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- shield -->
  <path d="M56 8 L94 22 V52 C94 76 78 92 56 102 C34 92 18 76 18 52 V22 Z"
        fill="#0B1220" stroke="url(#stroke)" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- interprocedural taint flow: source dot, bends across "layers", to the sink -->
  <path d="M37 40 H52 C58 40 58 56 64 56 H72"
        fill="none" stroke="url(#stroke)" stroke-width="4" stroke-linecap="round"/>
  <path d="M52 40 V66 C52 74 58 74 64 74 H72"
        fill="none" stroke="url(#stroke)" stroke-width="3.2" stroke-linecap="round" opacity="0.5"/>

  <!-- source -->
  <circle cx="37" cy="40" r="5.5" fill="#34D399"/>

  <!-- sink, caught (ring + check) -->
  <circle cx="74" cy="56" r="9" fill="#0B1220" stroke="#22D3EE" stroke-width="4"/>
  <path d="M70 56 l3 3.2 5.5-6.4" fill="none" stroke="#22D3EE" stroke-width="3.4"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
