# Ground truth for the Spring Taint benchmark.
#
# Each case declares whether a taint flow is expected (`expected: true`) or the
# flow is safe and must NOT be reported (`expected: false`). Positive cases
# measure recall; safe cases measure precision. Sources and sinks are located by
# the `taint-source:` / `taint-sink:` marker comments in the referenced files.
#
# `knownGap: true` marks a real vulnerability the engine does not detect yet,
# with the reason — so recall is reported honestly.
#
# Paths are relative to this module (spring-taint-benchmark/).

benchmark: spring-taint-benchmark
version: 0.17.1
base: src/main/java/io/github/gabrielbbaldez/springtaint/benchmark

cases:
  # ---------------- SQL injection (CWE-89) ----------------
  - id: sqli-direct
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: sqli/direct/SqliDirectController.java
    sinkFile: sqli/direct/SqliDirectController.java
    note: "source and sink in the same method; baseline"

  - id: sqli-through-service
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: true
    flow: [Controller, Service, Repository]
    sourceFile: sqli/throughservice/UserController.java
    sinkFile: sqli/throughservice/UserRepository.java
    note: "flagship: taint crosses three layers"

  - id: sqli-three-layers
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: true
    flow: [Controller, Service, Validator, Repository]
    sourceFile: sqli/threelayers/ThreeLayerController.java
    sinkFile: sqli/threelayers/ThreeLayerRepository.java
    note: "four layers; exercises deeper field-object modelling"

  - id: sqli-via-kafka
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: true
    phase: 2
    sourceFile: sqli/viakafka/KafkaSqliListener.java
    sinkFile: sqli/viakafka/KafkaSqliListener.java
    note: "source is a @KafkaListener payload"

  - id: sqli-via-rabbit
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: true
    phase: 2
    sourceFile: sqli/viarabbit/RabbitSqliListener.java
    sinkFile: sqli/viarabbit/RabbitSqliListener.java
    note: "source is a @RabbitListener payload (RabbitMQ / Spring AMQP)"

  - id: sqli-safe-parameterized
    category: sql-injection
    expected: false
    crossLayer: true
    sourceFile: sqli/safe/SafeUserController.java
    sinkFile: sqli/safe/SafeUserRepository.java
    note: "NamedParameterJdbcTemplate binding; must NOT be flagged"

  - id: sqli-safe-prepared
    category: sql-injection
    expected: false
    crossLayer: false
    sourceFile: sqli/safe/PreparedStatementController.java
    sinkFile: sqli/safe/PreparedStatementController.java
    note: "bound '?' parameter; must NOT be flagged"

  # ---------------- XSS (CWE-79) ----------------
  - id: xss-reflected
    category: xss
    severity: high
    expected: true
    crossLayer: false
    sourceFile: xss/reflected/ReflectedXssController.java
    sinkFile: xss/reflected/ReflectedXssController.java
    note: "request parameter written to the response without escaping"

  - id: xss-conditional-sanitizer
    category: xss
    severity: high
    expected: true
    crossLayer: false
    sourceFile: conditional/ConditionalSanitizerController.java
    sinkFile: conditional/ConditionalSanitizerController.java
    note: "sanitizer applied only on one branch; the other path is vulnerable"

  - id: xss-safe-escaped
    category: xss
    expected: false
    crossLayer: false
    sourceFile: xss/safe/SafeXssController.java
    sinkFile: xss/safe/SafeXssController.java
    note: "HtmlUtils.htmlEscape; must NOT be flagged"

  # ---------------- SSRF (CWE-918) ----------------
  - id: ssrf-rest-template
    category: ssrf
    severity: high
    expected: true
    crossLayer: false
    sourceFile: ssrf/resttemplate/SsrfRestTemplateController.java
    sinkFile: ssrf/resttemplate/SsrfRestTemplateController.java
    note: "user-controlled URL fetched via RestTemplate"

  # ---------------- SpEL injection (CWE-917) ----------------
  - id: spel-injection
    category: spel-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: spel/SpelInjectionController.java
    sinkFile: spel/SpelInjectionController.java
    note: "user expression parsed and evaluated"

  # ---------------- Path traversal (CWE-22) ----------------
  - id: path-traversal-direct
    category: path-traversal
    severity: high
    expected: true
    crossLayer: false
    sourceFile: pathtraversal/direct/PathTraversalController.java
    sinkFile: pathtraversal/direct/PathTraversalController.java
    note: "untrusted filename concatenated into a filesystem path"

  # ---------------- Command injection (CWE-78) ----------------
  - id: cmdi-direct
    category: command-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: cmdi/direct/CommandInjectionController.java
    sinkFile: cmdi/direct/CommandInjectionController.java
    note: "untrusted host concatenated into Runtime.exec"

  # ---------------- Open redirect (CWE-601) ----------------
  - id: open-redirect
    category: open-redirect
    severity: medium
    expected: true
    crossLayer: false
    sourceFile: openredirect/OpenRedirectController.java
    sinkFile: openredirect/OpenRedirectController.java
    note: "user-controlled redirect target; detected via call-site sink matching"

  # ---------------- Source coverage (Spring MVC inputs) ----------------
  - id: path-variable-sqli
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: sources/PathVariableSqliController.java
    sinkFile: sources/PathVariableSqliController.java
    note: "source is @PathVariable"

  - id: request-body-sqli
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: sources/RequestBodySqliController.java
    sinkFile: sources/RequestBodySqliController.java
    note: "source is @RequestBody"

  - id: request-header-xss
    category: xss
    severity: high
    expected: true
    crossLayer: false
    sourceFile: sources/RequestHeaderXssController.java
    sinkFile: sources/RequestHeaderXssController.java
    note: "source is @RequestHeader"

  - id: map-param-sqli
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: sources/MapParamSqliController.java
    sinkFile: sources/MapParamSqliController.java
    note: "source is a @RequestParam Map; tainted value read via Map.get"

  - id: bean-accessor-sqli
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: bean/BeanAccessorSqliController.java
    sinkFile: bean/BeanAccessorSqliController.java
    note: "tainted value round-trips through a bean setter/getter (DTO as taint container)"

  # ---------------- Reactive (WebFlux / R2DBC) ----------------
  - id: webflux-sqli
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: webflux/WebFluxSqliController.java
    sinkFile: webflux/WebFluxSqliController.java
    note: "reactive R2DBC DatabaseClient.sql sink (interface), matched via call-site mode"

  # ---------------- Multi-framework (JAX-RS / Quarkus) ----------------
  - id: jaxrs-sqli
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: jaxrs/JaxRsSqliController.java
    sinkFile: jaxrs/JaxRsSqliController.java
    note: "source is JAX-RS @QueryParam (Quarkus / Jakarta REST)"

  # ---------------- Stored / second-order injection ----------------
  - id: stored-xss
    category: xss
    severity: high
    expected: true
    crossLayer: true
    flow: [SaveController, "@Repository", ReadController]
    sourceFile: storedinjection/StoredXssReadController.java
    sinkFile: storedinjection/StoredXssReadController.java
    note: "cross-request: persisted by one request, read (as untrusted) and rendered by another"

  # ---------------- JNDI injection (CWE-74) ----------------
  - id: jndi-injection
    category: jndi-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: jndi/JndiLookupController.java
    sinkFile: jndi/JndiLookupController.java
    note: "user-controlled name to InitialContext.lookup (the Log4Shell class of bug)"

  # ---------------- XXE (CWE-611) ----------------
  - id: xxe-document-builder
    category: xxe
    severity: high
    expected: true
    crossLayer: false
    sourceFile: xxe/XxeController.java
    sinkFile: xxe/XxeController.java
    note: "external input reaches an unhardened DocumentBuilder.parse"

  # ---------------- Log injection (CWE-117) ----------------
  - id: log-injection
    category: log-injection
    severity: low
    expected: true
    crossLayer: false
    sourceFile: loginjection/LogInjectionController.java
    sinkFile: loginjection/LogInjectionController.java
    note: "username concatenated into a log message; framework-internal log sinks are filtered out"

  # ---------------- Template injection / SSTI (CWE-1336) ----------------
  - id: template-injection-thymeleaf
    category: template-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: templateinjection/ThymeleafSstiController.java
    sinkFile: templateinjection/ThymeleafSstiController.java
    note: "user-controlled template name to ITemplateEngine.process"

  # ---------------- JPQL injection (CWE-89) ----------------
  - id: jpql-injection
    category: jpql-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: jpql/JpqlInjectionController.java
    sinkFile: jpql/JpqlInjectionController.java
    note: "concatenated JPQL to EntityManager.createQuery (JPA is not immune to injection)"

  # ---------------- Open redirect via ModelAndView (CWE-601) ----------------
  - id: open-redirect-modelandview
    category: open-redirect
    severity: medium
    expected: true
    crossLayer: false
    sourceFile: openredirect/ModelAndViewRedirectController.java
    sinkFile: openredirect/ModelAndViewRedirectController.java
    note: "\"redirect:\" + user input set as a Spring MVC view name"

  # ---------------- File-upload source (CWE-22) ----------------
  - id: upload-filename-path-traversal
    category: path-traversal
    severity: high
    expected: true
    crossLayer: false
    sourceFile: upload/FileUploadController.java
    sinkFile: upload/FileUploadController.java
    note: "source is MultipartFile.getOriginalFilename(); sink is new File(...)"

  # ---------------- Matrix-variable source (CWE-89) ----------------
  - id: matrix-variable-sqli
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: sources/MatrixVariableSqliController.java
    sinkFile: sources/MatrixVariableSqliController.java
    note: "source is @MatrixVariable (e.g. /users/42;role=admin)"

  # ---------------- Taint transfers (transparent wrappers) ----------------
  - id: optional-transfer-sqli
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: transfers/OptionalTransferController.java
    sinkFile: transfers/OptionalTransferController.java
    note: "taint flows through Optional.of/get; the Object unwrap is typed String to survive the cast"

  - id: completablefuture-transfer-sqli
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: false
    sourceFile: transfers/CompletableFutureTransferController.java
    sinkFile: transfers/CompletableFutureTransferController.java
    note: "taint flows through CompletableFuture.completedFuture/get"

  # ---------------- @FeignClient source (CWE-89) ----------------
  - id: feign-client-sqli
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: true
    flow: [Controller, "@FeignClient"]
    sourceFile: feign/FeignController.java
    sinkFile: feign/FeignController.java
    note: "source is a @FeignClient result (data from a downstream microservice)"

  # ---------------- @Scheduled entry point (CWE-89) ----------------
  - id: scheduled-job-sqli
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: true
    flow: ["@Scheduled", "@Repository"]
    sourceFile: scheduled/ScheduledSyncJob.java
    sinkFile: scheduled/ScheduledSyncJob.java
    note: "@Scheduled job (no request input) reads a @Repository value and sinks it"

  # ---------------- @Transactional stored injection (CWE-89) ----------------
  - id: transactional-stored-sqli
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: true
    flow: [Controller, "@Repository"]
    sourceFile: transactional/TransactionalController.java
    sinkFile: transactional/TransactionalController.java
    note: "write-then-read inside one @Transactional method; the read-back is a source"

  # ---------------- Near-miss sanitizers (attempted but incorrect sanitization) ----------------
  # A/B/C reach the sink anyway (the bad sanitizer does not clear taint), so the taint
  # engine detects them; with --src they are annotated with the reason. D is a false
  # negative for the taint engine alone (htmlEscape clears the taint) and is caught by
  # the near-miss layer with --src.
  - id: nearmiss-sql-replace
    category: sql-injection
    severity: critical
    expected: true
    crossLayer: false
    nearMiss: true
    sourceFile: nearmiss/NearMissSqlController.java
    sinkFile: nearmiss/NearMissSqlController.java
    note: "replaceAll(\"'\") does not prevent SQL injection"

  - id: nearmiss-xss-blacklist
    category: xss
    severity: high
    expected: true
    crossLayer: false
    nearMiss: true
    sourceFile: nearmiss/NearMissXssController.java
    sinkFile: nearmiss/NearMissXssController.java
    note: "blacklisting <script> is bypassable"

  - id: nearmiss-discarded-sanitizer
    category: xss
    severity: high
    expected: true
    crossLayer: false
    nearMiss: true
    sourceFile: nearmiss/NearMissDiscardedController.java
    sinkFile: nearmiss/NearMissDiscardedController.java
    note: "htmlEscape result discarded; original value is written"

  - id: nearmiss-wrong-context
    category: open-redirect
    severity: medium
    expected: true
    crossLayer: false
    nearMiss: true
    requiresSrc: true
    sourceFile: nearmiss/NearMissWrongContextController.java
    sinkFile: nearmiss/NearMissWrongContextController.java
    note: "htmlEscape before sendRedirect; detected by the near-miss layer with --src"

# Totals (kept in sync by hand).
summary:
  total: 40
  expectedVulnerable: 37
  expectedSafe: 3
  categories: [sql-injection, jpql-injection, xss, ssrf, spel-injection, jndi-injection,
               xxe, path-traversal, command-injection, log-injection, template-injection,
               open-redirect]
  sources: [RequestParam, PathVariable, RequestBody, RequestHeader, MatrixVariable, RequestPart,
            KafkaListener, RabbitListener, "JAX-RS QueryParam", "@Repository read (stored)",
            "MultipartFile.getOriginalFilename", "@FeignClient result", "@Scheduled entry point"]
  # Frameworks exercised by an actual benchmark case. Micronaut sources are implemented
  # in the engine but not yet covered by a case here, so it is intentionally omitted.
  frameworks: [Spring MVC, Spring WebFlux, Spring Kafka, Spring AMQP/RabbitMQ,
               JAX-RS/Quarkus, Spring Cloud OpenFeign]
  # Current engine results on this benchmark:
  detectedVulnerable: 36        # taint engine alone
  detectedWithNearMiss: 37      # adding the near-miss layer (--src) catches the wrong-context case
  falsePositives: 0
  # No vulnerability is fully missed; one case (nearmiss-wrong-context) is detected only
  # with the --src near-miss layer, not by the taint engine alone -- hence 36 vs 37.
  knownGaps: []
